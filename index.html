<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <h1>Rock Paper Scissors</h1>

        <div class="structure"> 
            <div class="choice" id="rock">
                <img src="images/rock1.jpg"> 
            </div>

            <div class="choice" id="paper">
                <img src="images/paper1.jpg">
            </div> 

            <div class="choice" id="scissors">
                <img src="images/scissors1.jpg">
            </div>            
        </div>

        <div class="score-board">
            <div class="score">
                <p id="user-score">0</p>
                <p>You</p>
            </div>
            <div class="score">
                <p id="comp-score">0</p>
                <p>Computer</p>
            </div>
        </div>

        <div class="msg-container">
            <p id="text"> Play Your Move </p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
